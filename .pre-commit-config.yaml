# Pre-commit hooks: lint, type-check, and a guard that blocks committing
# raw data / model binaries that should be DVC-tracked instead.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: [types-PyYAML]
        files: ^(src|api)/

  - repo: local
    hooks:
      - id: block-data-and-models
        name: Block committing data/model binaries (use DVC)
        entry: python scripts/block_untracked_artifacts.py
        language: system
        pass_filenames: true
