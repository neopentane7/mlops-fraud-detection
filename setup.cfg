[tool:pytest]
testpaths = tests
asyncio_mode = auto
addopts = -ra
# No pythonpath hack needed: the package is installed editable (pip install -e .),
# so `import src...` / `import api...` resolve without PYTHONPATH.

[coverage:run]
source = src
omit =
    src/__init__.py
    src/**/__init__.py
    tests/*

[coverage:report]
fail_under = 80
show_missing = True
